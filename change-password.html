<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Evidence Validator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="dashboard-layout">
        <main class="main-content">
            <div class="card" style="text-align: center; padding: 2rem; margin-bottom: 2rem;">
                <div style="font-size: 2.5rem; margin-bottom: 0.5rem">🔑</div>
                <h1>Security Settings</h1>
                <p>Update your account password to maintain security.</p>
            </div>

            <div class="card" style="background: rgba(0, 0, 0, 0.2); max-width: 500px; margin: 0 auto;">
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label>Old Password</label>
                        <input type="password" id="oldPassword" required placeholder="••••••••" />
                    </div>
                    <div class="form-group" style="margin-top: 1.5rem;">
                        <label>New Password</label>
                        <input type="password" id="newPassword" required placeholder="••••••••" />
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPassword" required placeholder="••••••••" />
                    </div>
                    
                    <div id="passwordError" class="error-message" style="margin-top: 1rem; color: #ef4444; font-size: 0.85rem; display: none;"></div>
                    
                    <button type="submit" class="btn" style="margin-top: 2rem;">Update Password</button>
                </form>
            </div>

            <p style="color: #64748b; font-size: 0.8rem; margin-top: 3rem; text-align: center;">
                Security Note: Changing your password will log you out of other active sessions.
            </p>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/monitor.js"></script>
    <script src="js/change-password.js"></script>
  </body>
</html>
