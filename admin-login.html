<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Evidence Validator</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #videoContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        video {
            width: 100%;
            max-width: 320px;
            border-radius: 8px;
            margin-bottom: 1rem;
            transform: scaleX(-1); 
        }
        #statusMsg {
            margin-top: 10px;
            font-weight: bold;
            color: #64748b;
        }
        .loading {
            color: #3b82f6;
        }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="split-layout flex-reverse">
        <!-- Right Side: Digital Forensics Image & Text -->
        <div class="login-left">
            <div class="login-left-internal">
                <h2>Digital Forensics</h2>
                <p>Advanced administrative portal for managing digital evidence integrity and multi-layered authentication protocols.</p>
            </div>
        </div>

        <!-- Left Side: Admin Form -->
        <div class="login-right">
            <div class="container">
                <div class="card">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <span style="font-size: 3rem;">🔐</span>
                    </div>
                    <h1>Admin Portal</h1>
                    <p>Digital Evidence Integrity Validator</p>
                    
                    <form id="adminForm">
                        <div class="form-group">
                            <label>Admin ID</label>
                            <input type="text" id="adminId" required placeholder="admin">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" required placeholder="••••••••">
                        </div>

                        <div id="error" class="error-message"></div>

                        <button type="submit" class="btn">Next Step</button>
                        
                        <div style="display: flex; justify-content: space-between; margin-top: 1rem;">
                            <a href="forgot-password.html" class="link" style="margin-top: 0; font-size: 0.8rem;">Forgot Password?</a>
                            <a href="index.html" class="link" style="margin-top: 0; font-size: 0.8rem;">User Login</a>
                        </div>
                    </form>

                    <div id="videoContainer">
                        <p>Verifying Biometrics...</p>
                        <div style="position: relative; display: flex; justify-content: center; margin-top: 1.5rem;">
                            <video id="video" autoplay muted style="border: 2px solid #818cf8;"></video>
                        </div>
                        <div id="statusMsg">Initializing Camera & Models...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script defer src="js/admin-login.js"></script>
</body>
</html>
