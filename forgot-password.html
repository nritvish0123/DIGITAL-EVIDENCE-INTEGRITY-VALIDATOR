<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Evidence Validator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Recovery</h1>
            <p>Enter your email to receive your password</p>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label>Email Address / Admin ID</label>
                    <input type="text" id="email" required placeholder="john@example.com">
                </div>

                <div id="msg" class="error-message" style="color: #3b82f6;"></div>

                <button type="submit" class="btn" style="background: linear-gradient(135deg, #3b82f6, #6366f1);">Send Recovery Email</button>
                
                <a href="index.html" class="link">Return to Login</a>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/forgot-password.js"></script>

</body>
</html>
