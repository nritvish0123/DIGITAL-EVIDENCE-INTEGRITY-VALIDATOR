<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Evidence - Evidence Validator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <main class="main-content">
            <div class="container">
                <div class="card">
                    <div style="font-size: 3rem; margin-bottom: 0.5rem; text-align: center;">📤</div>
                    <h1>Upload Evidence</h1>
                    <p>Securely submit digital evidence for integrity validation.</p>
                    
                    <div style="margin: 2rem 0; padding: 3rem; background: rgba(0,0,0,0.2); border-radius: 12px; border: 2px dashed rgba(255,255,255,0.1); text-align: center;" id="dropZone">
                        <input type="file" id="evidenceFile" style="display: none;">
                        <p id="filePrompt">Drag and drop evidence files here or click to browse.</p>
                        <div id="fileInfo" class="hidden" style="margin-bottom: 1rem; text-align: center;">
                            <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">📄</div>
                            <div id="fileName" style="font-weight: 600; color: #f8fafc;"></div>
                            <div id="fileSize" style="font-size: 0.85rem; color: #94a3b8;"></div>
                        </div>
                        <button class="btn" id="selectBtn" style="width: auto; padding: 0.8rem 2rem; margin-top: 1rem;">Select Files</button>
                    </div>

                    <div id="idContainer" class="hidden" style="margin: 1.5rem 0; padding: 1.5rem; background: rgba(129, 140, 248, 0.1); border-radius: 8px; border: 1px solid rgba(129, 140, 248, 0.2);">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div>
                                <label style="margin-bottom: 0.5rem; display: block; color: #818cf8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Evidence ID</label>
                                <div id="evidenceIdDisplay" style="font-family: monospace; font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: 2px;"></div>
                            </div>
                            <div>
                                <label style="margin-bottom: 0.5rem; display: block; color: #10b981; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Evidence Code</label>
                                <div id="evidenceCodeDisplay" style="font-family: monospace; font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: 2px;"></div>
                            </div>
                        </div>
                        <p style="margin-top: 0.5rem; font-size: 0.75rem; color: #94a3b8; margin-bottom: 0;">Save these identifiers for tracking and verification.</p>
                    </div>

                    <div style="text-align: center;">
                        <button id="submitBtn" class="btn hidden" style="background: linear-gradient(135deg, #10b981, #059669);">Submit Evidence</button>
                        <a href="dashboard.html" class="link dynamic-dashboard-link">← Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/monitor.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/upload.js"></script>


</body>
</html>
