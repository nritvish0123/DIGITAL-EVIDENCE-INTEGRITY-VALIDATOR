<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Evidence Validator</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-pending { background: #f59e0b; color: #fff; }
        .badge-approved { background: #10b981; color: #fff; }
        .badge-expired { background: #64748b; color: #fff; }
        .badge-suspicious { background: #ef4444; color: #fff; }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            padding: 2.5rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card.highlight {
            border: 2px solid #f59e0b;
        }
        .stat-val {
            font-size: 3rem;
            font-weight: 800;
            margin: 0.5rem 0;
            line-height: 1;
        }
        .val-blue { color: #818cf8; }
        .val-orange { color: #f59e0b; }
        .val-green { color: #10b981; }
        
        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Main Content Area -->
        <main class="main-content">
            <div class="card" style="text-align: center; padding: 2.5rem; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 0.5rem">🛡️</div>
                <h1>Admin Control Center</h1>
                <p>Digital Evidence Integrity Validator</p>
            </div>

            <!-- Employee Profile Card (Admin) -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-img-container">
                        <img src="img/profile_ritvish.png" alt="Admin Profile">
                    </div>
                    <div class="profile-name" id="display-name">Loading...</div>
                    <div class="profile-status" id="display-status" style="background: #1e40af;">...</div>
                </div>
                <div class="profile-info-list">
                    <div class="profile-info-item">
                        <span class="info-label">Full Name</span>
                        <span class="info-value" id="info-name">...</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="info-label">DOB</span>
                        <span class="info-value" id="info-dob">...</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="info-label">Gender</span>
                        <span class="info-value" id="info-gender">...</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="info-label">Admin Email</span>
                        <span class="info-value" id="info-email">...</span>
                    </div>
                    <div class="profile-info-item" style="border-bottom: none;">
                        <span class="info-label">Phone</span>
                        <span class="info-value" id="info-phone">...</span>
                    </div>
                </div>
            </div>

            <!-- Stats Overview -->
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-val val-blue" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending Logins</div>
                    <div class="stat-val val-blue" id="pendingCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">System Health</div>
                    <div class="stat-val val-green">Stable</div>
                </div>
            </div>

            <!-- Hidden tables for data syncing -->
            <div class="hidden">
                <tbody id="usersTable"></tbody>
                <tbody id="pendingTable"></tbody>
                <tbody id="logsTable"></tbody>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Dashboard specific updates
        const originalLoadData = loadData;
        loadData = async function() {
            await originalLoadData();
            const res = await apiCall('/admin-data');
            if (res.success && res.data) {
                const { users, requests } = res.data;
                document.getElementById('totalUsers').textContent = users.length;
                
                const pCount = requests.filter(r => r.status === 'pending').length;
                document.getElementById('pendingCount').textContent = pCount;
                document.getElementById('loginSummary').textContent = `${pCount} requests waiting`;
            }
        };
    </script>
</body>
</html>
